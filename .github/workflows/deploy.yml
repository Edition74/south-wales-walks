# Rebuilds the walks spreadsheet, fetches Wikimedia Commons photos, builds
# the HTML app, then publishes to GitHub Pages. Runs on every push to `main`
# and can be triggered manually from the Actions tab.
name: Build & deploy walks app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl jsonschema

      - name: Validate walks/*.json against schema
        # Fail fast: if any walk JSON is malformed, every later step is wasted.
        run: python scripts/validate_walks.py

      - name: Build the spreadsheet
        run: python build_walks.py

      # Cache photo lookups between runs so we only hit the Wikimedia
      # Commons API when something relevant changes. Cache key busts on any
      # change to the walk source OR the fetch script itself, so bug-fixes
      # to fetch_photos.py force a clean refetch. The "v3" prefix sidesteps
      # both the v1 (broken Geograph q=postcode) and v2 (Geograph ll=
      # silently empty) caches, which are full of empties.
      - name: Restore photo cache
        id: photos-cache
        uses: actions/cache@v4
        with:
          path: photos_cache.json
          key: photos-v3-${{ hashFiles('fetch_photos.py', 'walks/*.json') }}
          restore-keys: |
            photos-v3-

      - name: Fetch Wikimedia Commons photos
        continue-on-error: true
        run: python fetch_photos.py

      - name: Build the web app (index.html)
        env:
          # Both are safe to expose to browsers. Anon key is designed for
          # client-side use; row-level security policies do the protection.
          # Add these at Settings -> Secrets and variables -> Actions.
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python build_gui.py

      - name: Stage site files
        # Copies the entrypoint + the per-walk static pages built by
        # build_gui.py. We only ship the *.html files from walks/ — the
        # walks/*.json source files are repo-internal (build inputs) and
        # don't need to be on the public site.
        # editor.html + editor.js: auth-gated content management page.
        run: |
          mkdir -p _site/walks
          cp index.html _site/index.html
          cp ratings.js _site/ratings.js
          cp editor.html _site/editor.html
          cp editor.js _site/editor.js
          cp South_Wales_Walks_Database.xlsx _site/South_Wales_Walks_Database.xlsx
          cp walks/*.html _site/walks/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
