# Rebuilds the walks spreadsheet and HTML app, then publishes to GitHub Pages.
# Runs automatically on every push to `main` — and can be triggered manually
# from the Actions tab.
name: Build & deploy walks app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Build the spreadsheet
        run: python build_walks.py

      - name: Build the web app (index.html)
        run: python build_gui.py

      - name: Stage site files
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp South_Wales_Walks_Database.xlsx _site/South_Wales_Walks_Database.xlsx

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
