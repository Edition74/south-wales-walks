# Rebuilds the walks spreadsheet, fetches Geograph photos, builds the HTML
# app, then publishes to GitHub Pages. Runs on every push to `main` and can
# be triggered manually from the Actions tab.
name: Build & deploy walks app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl jsonschema

      - name: Validate walks/*.json against schema
        # Fail fast: if any walk JSON is malformed, every later step is wasted.
        run: python scripts/validate_walks.py

      - name: Build the spreadsheet
        run: python build_walks.py

      # Cache Geograph photo lookups between runs so we only hit the
      # Geograph API when something relevant changes. Cache key busts on any
      # change to the walk source OR the fetch script itself, so bug-fixes
      # to fetch_photos.py force a clean refetch. The "v2" prefix sidesteps
      # the old v1 cache whose entries used a broken q=<postcode> query.
      - name: Restore Geograph photo cache
        id: photos-cache
        uses: actions/cache@v4
        with:
          path: photos_cache.json
          key: photos-v2-${{ hashFiles('fetch_photos.py', 'walks/*.json') }}
          restore-keys: |
            photos-v2-

      - name: Fetch Geograph photos
        continue-on-error: true
        run: python fetch_photos.py

      - name: Build the web app (index.html)
        env:
          # Both are safe to expose to browsers. Anon key is designed for
          # client-side use; row-level security policies do the protection.
          # Add these at Settings -> Secrets and variables -> Actions.
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python build_gui.py

      - name: Stage site files
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp ratings.js _site/ratings.js
          cp South_Wales_Walks_Database.xlsx _site/South_Wales_Walks_Database.xlsx

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
